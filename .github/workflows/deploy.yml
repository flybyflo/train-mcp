name: Build and Deploy (Local Registry + Helm)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: localhost:5000
  IMAGE_NAME: train-mcp
  RELEASE_NAME: train-mcp
  NAMESPACE: train

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx (host network + allow HTTP local registry)
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: |
            network=host
          buildkitd-config-inline: |
            [registry."localhost:5000"]
              http = true
              insecure = true
            [registry."127.0.0.1:5000"]
              http = true
              insecure = true

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Deploy to Kubernetes with Helm
        env:
          KUBE_SECRET: ${{ secrets.KUBE_SECRET }}
        run: |
          set -euo pipefail

          # Setup kubeconfig from GitHub secret
          mkdir -p "$HOME/.kube"
          echo "$KUBE_SECRET" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          export KUBECONFIG="$HOME/.kube/config"

          # Verify cluster access
          kubectl cluster-info

          # Port-forward local registry service from the cluster
          kubectl -n registry port-forward service/local-registry 5000:5000 >/tmp/registry-port-forward.log 2>&1 &
          PF_PID=$!
          trap 'kill "$PF_PID"' EXIT

          # Wait for registry readiness
          for i in {1..30}; do
            code="$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:5000/v2/ || true)"
            if [ "$code" = "200" ] || [ "$code" = "401" ]; then
              echo "Registry is ready (HTTP $code)"
              break
            fi
            sleep 1
          done

          # Build and push image to the local registry
          docker buildx build \
            --push \
            -t "$REGISTRY/$IMAGE_NAME:${{ github.sha }}" \
            -t "$REGISTRY/$IMAGE_NAME:latest" \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            ./mcp

          # Deploy with Helm, pinning the SHA image tag
          helm upgrade --install "$RELEASE_NAME" ./mcp/charts/train-mcp \
            --namespace "$NAMESPACE" \
            --create-namespace \
            --set image.repository="$REGISTRY/$IMAGE_NAME" \
            --set image.tag="${{ github.sha }}"

          # Wait for rollout completion
          kubectl -n "$NAMESPACE" rollout status deployment/"$RELEASE_NAME" --timeout=180s
